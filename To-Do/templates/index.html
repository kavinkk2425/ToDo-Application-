<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<main class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>My <span>Todo</span></h1>
      <p>Organize your day, one task at a time.</p>
    </div>
    <button id="theme-btn" title="Toggle theme">🌙</button>
  </div>

  <!-- Date -->
  <div class="date-chip">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span id="current-date"></span>
  </div>

  <!-- Stats -->
  <div class="dashboard">
    <div class="stat total"><h2 id="total-task">0</h2><p>Total</p></div>
    <div class="stat done"><h2 id="completed-task">0</h2><p>Done</p></div>
    <div class="stat left"><h2 id="pending-task">0</h2><p>Pending</p></div>
  </div>

  <!-- Progress Ring -->
  <div class="ring-card">
    <div class="ring-wrap">
      <svg width="84" height="84" viewBox="0 0 84 84">
        <circle class="track" cx="42" cy="42" r="35"/>
        <circle class="fill" id="ring-fill" cx="42" cy="42" r="35"/>
      </svg>
      <div class="ring-pct" id="progress-text">0%</div>
    </div>
    <div class="ring-info">
      <h3>Today's Progress</h3>
      <p id="ring-label">No tasks added yet</p>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Search tasks…" autocomplete="off" />
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="active" data-filter="all">All <span class="filter-count">0</span></button>
    <button data-filter="active">Active <span class="filter-count">0</span></button>
    <button data-filter="completed">Completed <span class="filter-count">0</span></button>
  </div>

  <div class="list-progress">
    <div class="progress-copy">
      <div>
        <div class="progress-title">Task progress</div>
        <div id="progress-summary" class="progress-meta">0 of 0 tasks done</div>
      </div>
      <div id="progress-label" class="progress-status">Keep momentum going</div>
    </div>
    <div class="progress-track">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
  </div>

  <!-- Add Task -->
  <form id="task-form" class="task-form">
    <input id="task-input" name="task" type="text" placeholder="What needs to be done?" autocomplete="off" required />
    <select id="priority">
      <option value="low">Low</option>
      <option value="med" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <button type="submit" class="add-btn">+ Add</button>
  </form>

  <!-- Task List -->
  <ul id="task-list" class="task-list"></ul>

  <!-- Footer -->
  <div class="footer">💡 Press Enter to quickly add a task.</div>

</main>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <nav class="mobile-nav">
    <button class="mobile-tab active" type="button" data-action="home">🏠<span>Home</span></button>
    <button class="mobile-tab" type="button" data-action="search">🔎<span>Search</span></button>
    <button class="mobile-tab" type="button" data-action="add">➕<span>Add</span></button>
    <button class="mobile-tab" type="button" data-action="stats">📊<span>Stats</span></button>
    <button class="mobile-tab" type="button" data-action="more">⚙️<span>More</span></button>
  </nav>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
